name: Build and Release with Python3.13

# 强制启用 Node.js 24，彻底消除弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  release:
    types: [published]
  push:
    tags:
      - 220*
  workflow_dispatch:
    inputs:
      tag:
        description: "Release Tag (e.g. 220.0.1)"
        required: true
      prerelease:
        description: "Pre-release?"
        required: false
        default: "false"

jobs:
  build-app:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # 直接定义矩阵，简化逻辑
      matrix:
        include:
          - build: macos
            os: macos-latest
            arch: aarch64
            ext: dmg
          - build: windows
            os: windows-latest
            arch: x86_64
            ext: exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # 最新版，兼容 Node24

      - name: Set up Python 3.13
        uses: actions/setup-python@v5  # 最新版，兼容 Node24
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7  # 升级到 v7，兼容 Node24
        with:
          activate-environment: true

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      # 统一获取版本号（兼容所有触发方式）
      - name: Resolve version tag
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION=${{ github.event.inputs.tag }}
          else
            VERSION=${{ github.ref_name }}
          fi
          echo "tag=$VERSION" >> $GITHUB_OUTPUT

      # 统一获取发布类型（预发布/正式版）
      - name: Resolve release type
        id: release
        shell: bash
        run: |
          PRERELEASE=false
          if [ "${{ github.event_name }}" = "release" ]; then
            PRERELEASE=${{ github.event.release.prerelease }}
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PRERELEASE=${{ github.event.inputs.prerelease }}
          fi
          echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT

      # 读取更新日志
      - name: Get changelog
        id: changelog
        shell: bash
        run: |
          if [ ! -s changelog.md ]; then
            echo "changelog.md is empty or missing" && exit 1
          fi
          EOF="__CHANGELOG_EOF__"
          echo "content<<$EOF" >> $GITHUB_OUTPUT
          cat changelog.md >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      # 构建 macOS 应用
      - name: Build macOS app
        if: matrix.build == 'macos'
        run: uv run scripts/build.py --create-dmg --version ${{ steps.version.outputs.tag }} --debug

      # 构建 Windows 应用
      - name: Build Windows app
        if: matrix.build == 'windows'
        run: uv run scripts/build.py --debug
        env:
          PYTHONIOENCODING: utf-8

      # 上传构建产物到 Release（统一逻辑，自动适配系统）
      - name: Upload release asset
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.version.outputs.tag }}
          file: dist/MDCx.${{ matrix.ext }}
          asset_name: MDCx-${{ steps.version.outputs.tag }}-${{ matrix.build }}-${{ matrix.arch }}.${{ matrix.ext }}
          overwrite: true
          prerelease: ${{ steps.release.outputs.prerelease }}
          body: ${{ steps.changelog.outputs.content }}
