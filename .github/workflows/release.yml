name: Build and Release with Python3.13

on:
  release:
    types: [published]
  push:
    tags:
      - 220*
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag"
        required: true
      prerelease:
        description: "是否作为预发布（pre-release）"
        required: false
        default: "false"

jobs:
  init-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      # https://github.com/actions/runner/issues/1985#issuecomment-1573518052
      - name: Set matrix
        id: set-matrix
        run: |
          items=()

          # https://docs.github.com/en/actions/using-github-hosted-runners/about-github-hosted-runners/about-github-hosted-runners

          items+=('{"build": "macos", "os": "macos-latest", "arch": "aarch64"}')
          items+=('{"build": "windows", "os": "windows-latest", "arch": "x86_64"}')

          # 合并items到json数组
          matrix="matrix=["
          for ((i=0; i<${#items[@]}; i++)); do
            matrix+=" ${items[i]}"
            if ((i != ${#items[@]}-1)); then
              matrix+=","
            fi
          done
          matrix+="]"

          # 输出matrix到GITHUB_OUTPUT
          echo $matrix >> $GITHUB_OUTPUT

  build-app:
    needs: init-matrix
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{fromJson(needs.init-matrix.outputs.matrix)}}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          activate-environment: true

      - name: Set up python env
        run: uv sync --locked --all-extras --dev

      - name: Build macOS app - macOS
        if: ${{ matrix.build == 'macos' }}
        run: |
          version="${{ github.ref_name }}"
          # 如果是手动触发，则使用输入的tag
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            version="${{ github.event.inputs.tag }}"
          fi
          uv run scripts/build.py --create-dmg --version "$version" --debug

      - name: Build Windows app - Windows
        if: ${{ matrix.build == 'windows' }}
        env:
          PYTHONIOENCODING: utf-8
        run: uv run scripts/build.py --debug

      - name: Get changelog
        id: get-changelog
        shell: bash
        run: |
          if [ ! -s changelog.md ]; then
            echo "changelog.md 不存在或为空，无法生成 Release 说明。"
            exit 1
          fi

          delimiter="__MDCX_CHANGELOG_EOF__"
          {
            echo "CHANGELOG<<$delimiter"
            cat changelog.md
            echo
            echo "$delimiter"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve release type
        id: release-type
        shell: bash
        run: |
          prerelease=false
          if [ "${{ github.event_name }}" = "release" ]; then
            prerelease="${{ github.event.release.prerelease }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.prerelease }}" = "true" ]; then
            prerelease=true
          fi
          echo "prerelease=$prerelease" >> $GITHUB_OUTPUT

      - name: Create Release - macOS
        uses: svenstaro/upload-release-action@v2
        if: ${{ matrix.build == 'macos' }}
        with:
          overwrite: true
          asset_name: MDCx-$tag-${{ matrix.build }}-${{ matrix.arch }}${{ matrix.tail }}-${{ github.sha }}.dmg
          file: dist/MDCx.dmg
          prerelease: ${{ steps.release-type.outputs.prerelease }}
          body: ${{ steps.get-changelog.outputs.CHANGELOG }}
          tag: ${{ github.event.inputs.tag || github.ref }}

      - name: Create Release - Windows
        uses: svenstaro/upload-release-action@v2
        if: ${{ matrix.build == 'windows' }}
        with:
          overwrite: true
          asset_name: MDCx-$tag-${{ matrix.build }}-${{ matrix.arch }}${{ matrix.tail }}-${{ github.sha }}.exe
          file: dist/MDCx.exe
          prerelease: ${{ steps.release-type.outputs.prerelease }}
          body: ${{ steps.get-changelog.outputs.CHANGELOG }}
          tag: ${{ github.event.inputs.tag || github.ref }}
